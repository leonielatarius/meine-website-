<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160" viewBox="0 0 320 160">
        
                <!-- Hintergrund -->
                <rect x="10" y="10" width="300" height="140" rx="15" ry="15" fill="#ffffff" stroke="rgb(81, 123, 201)" stroke-width="2" />
        
                <!-- Wiederverwendbarer Stern -->
                <defs>
                    <g id="stern">
                        <polygon points="0,-10 3,-3 10,-3 4,1 6,9 0,4 -6,9 -4,1 -10,-3 -3,-3" fill="#050505" stroke="rgb(81, 123, 201)"
                            stroke-width="1.5" />
                    </g>
                </defs>
        
                <!-- Animierter Mond als Gruppe -->
                <g transform="translate(40 35)">
                    <circle cx="35" cy="35" r="25" fill="#000000" stroke="rgb(81, 123, 201)" stroke-width="2" />
        
                    <circle cx="45" cy="28" r="23" fill="#ffffff" />
        
                    <animateTransform attributeName="transform" type="translate" values="40 35; 50 35; 40 35" dur="4s"
                        repeatCount="indefinite" />
                </g>
        
                <!-- Sterne werden mit use wiederverwendet -->
                <g>
                    <use href="#stern" transform="translate(150 45) scale(1)" />
                    <use href="#stern" transform="translate(200 65) scale(1.4)" />
                    <use href="#stern" transform="translate(250 40) rotate(25) scale(1.1)" />
                </g>
        
                <!-- Linie unten -->
                <line x1="60" y1="120" x2="260" y2="120" stroke="rgb(81, 123, 201)"  stroke-width="3" stroke-linecap="round" />
        
                <!-- Beschriftung -->
                <text x="160" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#222">
        
                </text>
        
</svg>
        