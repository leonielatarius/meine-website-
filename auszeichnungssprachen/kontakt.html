<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kontakt</title>

<body>

    <header>
        <h1>Kontakt</h1>
        <p>Hier kannst du mir eine Nachricht schreiben.</p>
    </header>

    <nav>
        <a href="index.html">Startseite</a> |
        <a href="projekte.html">Projekte</a> |
        <a href="kontakt.html">Kontakt</a>|
         <a href="CV.html">Mein CV</a>
    </nav>

    <main>

        <section>
            <h2>Kontaktformular</h2>

            <form action="/register" method="post">

                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">E-Mail:</label><br>
                <input type="email" id="email" name="email"><br><br>

                <label for="msg">Nachricht:</label><br>
                <textarea id="msg" name="message"></textarea><br><br>

                <label for="course">Studiengang:</label><br>
                <select id="course" name="course">
                    <option>Medieninformatik</option>
                    <option>Informatik</option>
                    <option>Design</option>
                    <option>Andere</option>
                </select><br><br>

                <button type="submit">Absenden</button>

            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 Leonie Jaqueline Latarius</p>
    </footer>

</body>
</html>
